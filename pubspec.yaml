name: moto_gestor
description: "Painel financeiro para motociclistas de aplicativos de entrega e transporte."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.6

  # Estado
  provider: ^6.1.2

  # Banco de dados local
  sqflite: ^2.3.3+1
  path: ^1.9.0
  path_provider: ^2.1.3

  # Gráficos
  fl_chart: ^0.68.0

  # Utilidades
  intl: ^0.20.2
  uuid: ^4.4.0
  collection: ^1.18.0

  # Ícones e UI moderna
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Rastreamento de rota (modo Corrida). flutter_foreground_task mantém
  # o processo do app vivo em segundo plano (via serviço em primeiro
  # plano do Android); geolocator cuida do GPS em si dentro dele.
  # Voltamos para a versão atual: o bug que nos forçou a rebaixar para
  # 11.x só ocorria em Flutter anterior à 3.27 — já não se aplica mais
  # agora que o workflow usa Flutter 3.44.
  geolocator: ^13.0.2
  geocoding: ^3.0.0
  permission_handler: ^11.3.1
  flutter_foreground_task: ^8.10.4

  # Mapa do trajeto (botão "Mapa" nos lançamentos vindos do GPS).
  # Usa OpenStreetMap via flutter_map — não precisa de chave de API.
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
